<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sosso">
<title>World of Sosso</title>
<style>
  html, body { height: 100%; }
  body {
    margin: 0; background: #1a1a2e;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; min-height: 100dvh;
    font-family: monospace; color: #fff; flex-direction: column;
    overscroll-behavior: none;
    -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
  }
  body.pseudo-fs { overflow: hidden; }
  body.pseudo-fs .hint, body.pseudo-fs #controls { display: none; }

  #game {
    border: 2px solid #444;
    width: 800px;
    height: 480px;
    overflow: hidden;
  }
  /* Native fullscreen (desktop) */
  #game:fullscreen,
  #game:-webkit-full-screen {
    width: 100vw; height: 100vh;
    border: 0; background: #000;
    display: flex; align-items: center; justify-content: center;
  }
  /* Pseudo-fullscreen fallback (iOS / browsers without div-fullscreen) */
  #game.pseudo-fs {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    width: 100dvw; height: 100dvh;
    border: 0; background: #000;
    display: flex; align-items: center; justify-content: center;
    z-index: 9000;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    box-sizing: border-box;
  }
  #game canvas {
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }

  #controls {
    position: absolute; top: 12px; right: 12px;
    display: flex; gap: 8px; z-index: 20;
  }
  #controls button {
    background: #222; color: #fff; border: 1px solid #555;
    font-family: monospace; font-size: 13px; padding: 6px 10px;
    cursor: pointer; border-radius: 3px;
  }
  #controls button:hover { background: #333; }
  .hint { margin-top: 10px; opacity: 0.7; font-size: 13px; text-align: center; padding: 0 12px; }

  /* Floating mobile-only fullscreen toggle, visible during pseudo-fs */
  #mobile-fs {
    display: none;
    position: fixed; top: calc(8px + env(safe-area-inset-top)); right: calc(8px + env(safe-area-inset-right));
    z-index: 9100;
    width: 44px; height: 44px;
    background: rgba(0,0,0,0.5); color: #fff;
    border: 1px solid rgba(255,255,255,0.5); border-radius: 6px;
    font-family: monospace; font-size: 18px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  @media (pointer: coarse) { #mobile-fs { display: block; } }

  .touch-controls {
    display: none;
    position: fixed;
    bottom: calc(12px + env(safe-area-inset-bottom));
    left: calc(env(safe-area-inset-left));
    right: calc(env(safe-area-inset-right));
    padding: 0 12px;
    justify-content: space-between;
    pointer-events: none;
    z-index: 9200;
    user-select: none;
  }
  .touch-controls .group { display: flex; gap: 14px; pointer-events: auto; }
  .touch-controls button {
    width: 54px; height: 54px; font-size: 24px;
    background: rgba(40,40,60,0.55); color: #fff;
    border: 2px solid rgba(255,255,255,0.45);
    border-radius: 50%;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    font-family: monospace;
    padding: 0;
  }
  .touch-controls button:active { background: rgba(120,120,180,0.75); }
  @media (pointer: coarse) { .touch-controls { display: flex; } }
  /* Slightly larger in landscape phones */
  @media (pointer: coarse) and (orientation: landscape) and (max-height: 500px) {
    .touch-controls button { width: 60px; height: 60px; font-size: 26px; }
    .touch-controls .group { gap: 14px; }
  }

  /* Rotate-device overlay (portrait on touch only) */
  #rotate-overlay {
    display: none;
    position: fixed; inset: 0;
    background: #000;
    color: #fff;
    z-index: 9999;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    font-family: monospace; font-size: 18px;
    text-align: center; padding: 24px;
  }
  #rotate-overlay .icon { font-size: 64px; animation: spin 2.5s ease-in-out infinite; }
  @keyframes spin {
    0%, 40% { transform: rotate(0deg); }
    60%, 100% { transform: rotate(-90deg); }
  }
  body.show-rotate #rotate-overlay { display: flex; }

// ============================================================
// SAVE — localStorage progression
// ============================================================
const Save = {
  KEY: 'osso.save.v1',
  load() {
    try {
      const raw = localStorage.getItem(this.KEY);
      return raw ? JSON.parse(raw) : { maxLevel: 0 };
    } catch (_) { return { maxLevel: 0 }; }
  },
  setMaxLevel(lvl) {
    const d = this.load();
    if (lvl > (d.maxLevel || 0)) {
      d.maxLevel = lvl;
      try { localStorage.setItem(this.KEY, JSON.stringify(d)); } catch (_) {}
    }
  },
  clear() { try { localStorage.removeItem(this.KEY); } catch (_) {} }
};

// ============================================================
// AUDIO — procedural SFX + BGM via WebAudio
// ============================================================
let actx = null;
function ensureAudio() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
}
function beep({ freq = 440, freqEnd = null, dur = 0.1, type = 'square', vol = 0.15, attack = 0.005, release = 0.05 }) {
  if (!actx) return;
  const t0 = actx.currentTime;
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (freqEnd !== null) osc.frequency.exponentialRampToValueAtTime(Math.max(1, freqEnd), t0 + dur);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(vol, t0 + attack);
  gain.gain.linearRampToValueAtTime(0, t0 + dur + release);
  osc.connect(gain).connect(actx.destination);
  osc.start(t0);
  osc.stop(t0 + dur + release + 0.02);
}
function noise({ dur = 0.1, vol = 0.15, filterFreq = 2000 }) {
  if (!actx) return;
  const t0 = actx.currentTime;
  const bufSize = Math.floor(actx.sampleRate * dur);
  const buf = actx.createBuffer(1, bufSize, actx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
  const src = actx.createBufferSource();
  src.buffer = buf;
  const filt = actx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = filterFreq;
  const gain = actx.createGain();
  gain.gain.value = vol;
  src.connect(filt).connect(gain).connect(actx.destination);
  src.start(t0);
}
const sfx = {
  jump:  () => beep({ freq: 300, freqEnd: 480, dur: 0.08, type: 'sine', vol: 0.07, attack: 0.005, release: 0.03 }),
  land:  () => noise({ dur: 0.08, vol: 0.18, filterFreq: 900 }),
  coin:  () => { beep({ freq: 880, dur: 0.06, type: 'triangle', vol: 0.15 });
                 setTimeout(() => beep({ freq: 1320, dur: 0.09, type: 'triangle', vol: 0.15 }), 60); },
  hit:   () => { beep({ freq: 220, freqEnd: 55, dur: 0.35, type: 'sawtooth', vol: 0.2 });
                 noise({ dur: 0.25, vol: 0.15, filterFreq: 600 }); },
  win:   () => { [523, 659, 784, 1047].forEach((f, i) =>
                   setTimeout(() => beep({ freq: f, dur: 0.15, type: 'triangle', vol: 0.18 }), i * 110)); },
  stomp: () => { beep({ freq: 180, freqEnd: 80, dur: 0.12, type: 'square', vol: 0.15 });
                 noise({ dur: 0.08, vol: 0.12, filterFreq: 500 }); },
  slash: () => noise({ dur: 0.12, vol: 0.14, filterFreq: 3200 }),
  checkpoint: () => { beep({ freq: 660, dur: 0.08, type: 'triangle', vol: 0.16 });
                      setTimeout(() => beep({ freq: 990, dur: 0.1, type: 'triangle', vol: 0.16 }), 70);
                      setTimeout(() => beep({ freq: 1320, dur: 0.12, type: 'triangle', vol: 0.16 }), 150); }
};

const bgm = { playing: false, muted: false, timer: null, nextTime: 0, stepIdx: 0 };
function startBGM() {
  if (!actx || bgm.playing) return;
  bgm.playing = true;
  bgm.stepIdx = 0;
  bgm.nextTime = actx.currentTime + 0.1;
  const bpm = 104;
  const step = 60 / bpm / 2;
  const A2 = 110;
  const prog = [
    [0, 3, 7, 12],
    [-4, 0, 5, 8],
    [3, 7, 10, 15],
    [-2, 5, 10, 14]
  ];
  const arpPattern = [0, 1, 2, 3, 2, 3, 1, 2];
  const freq = (semi) => A2 * Math.pow(2, semi / 12);
  const note = (t, f, dur, type, vol) => {
    if (bgm.muted) return;
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type = type;
    o.frequency.value = f;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
    o.connect(g).connect(actx.destination);
    o.start(t);
    o.stop(t + dur + 0.02);
  };
  const schedule = () => {
    while (bgm.nextTime < actx.currentTime + 0.25) {
      const barIdx = Math.floor(bgm.stepIdx / 8) % prog.length;
      const chord = prog[barIdx];
      const localStep = bgm.stepIdx % 8;
      note(bgm.nextTime, freq(chord[arpPattern[localStep]]) * 2, step * 0.85, 'triangle', 0.035);
      if (localStep === 0 || localStep === 4) {
        note(bgm.nextTime, freq(chord[0]) / 2, step * 1.7, 'sine', 0.06);
      }
      if (localStep === 0) {
        note(bgm.nextTime, freq(chord[1]), step * 3.5, 'sine', 0.018);
        note(bgm.nextTime, freq(chord[2]), step * 3.5, 'sine', 0.018);
      }
      bgm.nextTime += step;
      bgm.stepIdx++;
    }
  };
  bgm.timer = setInterval(schedule, 60);
  schedule();
}
function toggleMute() { bgm.muted = !bgm.muted; }

// ============================================================
// TEXTURE GENERATION
// ============================================================
function generateTextures(scene) {
  const g = scene.add.graphics();

  g.fillStyle(0x6b4423, 1).fillRect(0, 0, 32, 32);
  g.fillStyle(0x553318, 1);
  [[4,12],[18,16],[10,22],[24,26],[14,8],[2,20]].forEach(([x,y]) => g.fillRect(x, y, 3, 3));
  g.fillStyle(0x4a7c2a, 1).fillRect(0, 0, 32, 8);
  g.fillStyle(0x65a23a, 1).fillRect(0, 0, 32, 4);
  g.fillStyle(0x7bc24a, 1);
  [3,9,15,21,27].forEach(x => g.fillRect(x, 2, 1, 3));
  g.generateTexture('ground', 32, 32);
  g.clear();

  g.fillStyle(0x6e6e78, 1).fillRect(0, 0, 96, 16);
  g.fillStyle(0x55555f, 1);
  [[10,8],[26,10],[42,6],[58,11],[74,9],[88,7]].forEach(([x,y]) => g.fillRect(x, y, 3, 2));
  g.fillStyle(0x8a8a94, 1).fillRect(0, 0, 96, 3);
  g.fillStyle(0x4a7c2a, 1).fillRect(0, 0, 96, 2);
  [6,22,40,58,76,90].forEach(x => g.fillRect(x, 2, 2, 2));
  g.generateTexture('platform', 96, 16);
  g.clear();

  g.fillStyle(0x6e6e78, 1).fillRect(0, 0, 128, 16);
  g.fillStyle(0x55555f, 1);
  [[10,8],[28,10],[46,6],[64,11],[82,9],[100,7],[118,10]].forEach(([x,y]) => g.fillRect(x, y, 3, 2));
  g.fillStyle(0x8a8a94, 1).fillRect(0, 0, 128, 3);
  g.fillStyle(0x4a7c2a, 1).fillRect(0, 0, 128, 2);
  for (let x = 6; x < 128; x += 16) g.fillRect(x, 2, 2, 2);

// ============================================================
// INPUT — keyboard + touch unified
// ============================================================
const touchState = { left: false, right: false, jump: false, attack: false };

class Input {
  constructor(scene) {
    this.scene = scene;
    this.cursors = scene.input.keyboard.createCursorKeys();
    this.wasd = scene.input.keyboard.addKeys({
      up: Phaser.Input.Keyboard.KeyCodes.W,
      left: Phaser.Input.Keyboard.KeyCodes.A,
      down: Phaser.Input.Keyboard.KeyCodes.S,
      right: Phaser.Input.Keyboard.KeyCodes.D
    });
    this.spaceKey = scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.rKey = scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.R);
    this.attackKey = scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.X);
    this.jKey = scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.J);
    this.pKey = scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.P);
    this.escKey = scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);
    this._prevTouchAttack = false;
    this._prevTouchJump = false;
  }
  get left() { return this.cursors.left.isDown || this.wasd.left.isDown || touchState.left; }
  get right() { return this.cursors.right.isDown || this.wasd.right.isDown || touchState.right; }
  get jump() { return this.cursors.up.isDown || this.wasd.up.isDown || this.spaceKey.isDown || touchState.jump; }
  attackJustPressed() {
    const k = Phaser.Input.Keyboard.JustDown(this.attackKey) || Phaser.Input.Keyboard.JustDown(this.jKey);
    const t = touchState.attack && !this._prevTouchAttack;
    this._prevTouchAttack = touchState.attack;
    return k || t;
  }
  restartJustPressed() { return Phaser.Input.Keyboard.JustDown(this.rKey); }
  pauseJustPressed() {
    return Phaser.Input.Keyboard.JustDown(this.pKey) || Phaser.Input.Keyboard.JustDown(this.escKey);
  }
}

// ============================================================
// PLAYER — sprite + state machine
// ============================================================
class Player {
  constructor(scene, x, y) {
    this.scene = scene;
    const sp = scene.physics.add.sprite(x, y, 'player');
    sp.setCollideWorldBounds(true);
    sp.setMaxVelocity(PLAYER.MAX_VX, PLAYER.MAX_VY);
    sp.body.setSize(PLAYER.BODY_W, PLAYER.BODY_H).setOffset(PLAYER.BODY_OFF_X, PLAYER.BODY_OFF_Y);
    this.sprite = sp;
    this.state = 'idle';
    this.lastAttackAt = 0;
    this.wasOnGround = true;
    this.lastRunDustAt = 0;
    this.invulnUntil = 0;
    sp.on('animationcomplete-punch', () => { if (this.state === 'punch') this.state = 'idle'; });
  }
  get x() { return this.sprite.x; }
  get y() { return this.sprite.y; }
  get body() { return this.sprite.body; }
  setState(s) {
    if (this.state === s) return;
    this.state = s;
    const map = { idle: 'idle', run: 'run', jump: 'jump', punch: 'punch' };
    if (map[s]) this.sprite.anims.play(map[s], true);
  }
  update(input, time) {
    const sp = this.sprite;
    const onGround = sp.body.blocked.down || sp.body.touching.down;

    if (input.left) { sp.setAccelerationX(-PLAYER.RUN_ACCEL); sp.setFlipX(true); }
    else if (input.right) { sp.setAccelerationX(PLAYER.RUN_ACCEL); sp.setFlipX(false); }
    else { sp.setAccelerationX(0); sp.setVelocityX(sp.body.velocity.x * PLAYER.FRICTION); }

    let justJumped = false;
    if (input.jump && onGround) {
      sp.setVelocityY(PLAYER.JUMP_VEL);
      sfx.jump();
      this.setState('jump');
      justJumped = true;
    }

    if (onGround && !justJumped && this.state !== 'punch') {
      if (Math.abs(sp.body.velocity.x) > 10) this.setState('run');
      else this.setState('idle');
    }

    const feetX = sp.x;
    const feetY = sp.y + 23;

    if (!this.wasOnGround && onGround) {
      const vy = Math.min(800, Math.abs(sp.body.velocity.y) + 200);
      const count = Phaser.Math.Clamp(Math.floor(vy / 120), 4, 10);
      this.scene.dust.emitParticleAt(feetX, feetY, count);
      sfx.land();
    }
    const vx = sp.body.velocity.x;
    if (onGround && Math.abs(vx) > PLAYER.RUN_DUST_VX_MIN && time - this.lastRunDustAt > PLAYER.RUN_DUST_INTERVAL) {
      const behind = feetX + (vx > 0 ? -10 : 10);
      this.scene.dust.emitParticleAt(behind, feetY, 1);
      this.lastRunDustAt = time;
    }
    this.wasOnGround = onGround;

    if (input.attackJustPressed() && time - this.lastAttackAt > PLAYER.ATTACK_COOLDOWN) {
      this.lastAttackAt = time;
      this.attack();
    }
  }
  attack() {
    const sp = this.sprite;
    this.setState('punch');
    sfx.slash();
    const dir = sp.flipX ? -1 : 1;
    const scene = this.scene;
    scene.time.delayedCall(PLAYER.ATTACK_HIT_DELAY, () => {
      if (!sp.active || scene.gameOver) return;
      scene.enemies.children.iterate(e => {
        if (!e || !e.active) return;
        const dx = e.x - sp.x;
        const dy = e.y - sp.y;
        if (Math.sign(dx) === dir && Math.abs(dx) < PLAYER.ATTACK_RANGE_X && Math.abs(dy) < PLAYER.ATTACK_RANGE_Y) {
          scene.killEnemy(e);
        }
      });
    });
  }
  flash() {
    const sp = this.sprite;
    this.scene.tweens.add({
      targets: sp, alpha: 0.3, duration: 90, yoyo: true, repeat: 4,
      onComplete: () => sp.setAlpha(1)
    });
  }
}

// ============================================================
// HELPERS — derived geometry from level data
// ============================================================
function computeHoles(level) {
  return level.groundGaps.map(([a, b]) => {
    const left  = Math.ceil(a / TILE) * TILE;
    const right = Math.ceil(b / TILE) * TILE;
    if (left >= right) return null;
    return { left, right };
  }).filter(Boolean);
}

function computeGroundRuns(worldWidth, holes) {
  const sorted = [...holes].sort((a, b) => a.left - b.left);
  const runs = [];
  let cursor = 0;
  for (const h of sorted) {
    if (h.left > cursor) runs.push({ x: cursor, w: h.left - cursor });
    cursor = Math.max(cursor, h.right);
  }
  if (cursor < worldWidth) runs.push({ x: cursor, w: worldWidth - cursor });
  return runs;
}

class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }
  preload() {
    this.load.spritesheet('player',       'sprite.png',  { frameWidth: 92, frameHeight: 92 });
    this.load.spritesheet('player_jump',  'sprite2.png', { frameWidth: 92, frameHeight: 92 });
    this.load.spritesheet('player_spin',  'sprite3.png', { frameWidth: 92, frameHeight: 92 });
    this.load.spritesheet('player_punch', 'sprite4.png', { frameWidth: 92, frameHeight: 92 });
    this.load.image('bagel', 'bagel.png');
  }
  create() {
    generateTextures(this);

    // shared anims registered once on global anims manager
    this.anims.create({ key: 'spin',  frames: this.anims.generateFrameNumbers('player_spin',  { start: 0, end: 7 }), frameRate: 10, repeat: -1 });
    this.anims.create({ key: 'idle',  frames: [{ key: 'player', frame: 0 }], frameRate: 1 });
    this.anims.create({ key: 'run',   frames: this.anims.generateFrameNumbers('player',       { start: 0, end: 5 }), frameRate: 12, repeat: -1 });
    this.anims.create({ key: 'jump',  frames: this.anims.generateFrameNumbers('player_jump',  { start: 0, end: 8 }), frameRate: 14, repeat: 0 });
    this.anims.create({ key: 'punch', frames: this.anims.generateFrameNumbers('player_punch', { start: 0, end: 2 }), frameRate: 18, repeat: 0 });

    // init persistent run-state on registry
    this.registry.set('score', 0);
    const save = Save.load();
    this.registry.set('startLevel', Math.min(save.maxLevel || 0, LEVELS.length - 1));
    this.registry.set('currentLevel', this.registry.get('startLevel'));
    this.registry.set('checkpoint', null);
    this.registry.set('hp', MAX_HP);

    this.scene.start('Title');
  }
}

class TitleScene extends Phaser.Scene {
  constructor() { super('Title'); }
  create() {
    this.cameras.main.setBackgroundColor('#000000');

    const hero = this.add.sprite(this.scale.width / 2, HEIGHT / 2 - 40, 'player_spin');
    hero.setScale(2);
    hero.play('spin');

    this.add.text(this.scale.width / 2, HEIGHT - 110, 'World of Sosso', {
      fontSize: '40px', color: '#ffffff', fontFamily: 'monospace',
      stroke: '#444', strokeThickness: 2
    }).setOrigin(0.5);

    const save = Save.load();
    const startLevel = Math.min(save.maxLevel || 0, LEVELS.length - 1);
    const continueMsg = startLevel > 0
      ? `Continue from Level ${startLevel + 1} — ${LEVELS[startLevel].name}`
      : 'Press any key to start';
    const prompt = this.add.text(this.scale.width / 2, HEIGHT - 66, continueMsg, {
      fontSize: '16px', color: '#aaaaaa', fontFamily: 'monospace'
    }).setOrigin(0.5);
    this.tweens.add({ targets: prompt, alpha: 0.3, duration: 700, yoyo: true, repeat: -1 });

    if (startLevel > 0) {
      this.add.text(this.scale.width / 2, HEIGHT - 40, '(Clear Save button resets progress)', {
        fontSize: '11px', color: '#777', fontFamily: 'monospace'
      }).setOrigin(0.5);
    }

    const start = () => {
      ensureAudio();
      this.registry.set('score', 0);
      this.registry.set('currentLevel', startLevel);
      this.registry.set('checkpoint', null);
      this.registry.set('hp', MAX_HP);
      this.scene.start('Game');
    };
    this.input.keyboard.once('keydown', start);
    this.input.once('pointerdown', start);
  }
}

class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }
  create() {
    this.gameOver = false;
    this.invulnUntil = 0;
    this.isTransitioning = false;
    this.bobbers = [];

    const currentLevel = this.registry.get('currentLevel');
    const level = LEVELS[currentLevel];
    const theme = THEMES[level.theme || 'outdoor'];
    const worldWidth = level.worldWidth;
    this.level = level;
    this.theme = theme;
    this.worldWidth = worldWidth;

    this.physics.world.setBounds(0, 0, worldWidth, HEIGHT);
    this.cameras.main.resetFX();

    this._buildBackground();
    this._buildGeometry();
    this._buildPickupsAndEnemies();
    this._buildGoalAndCheckpoints();
    this._spawnPlayer();
    this._buildParticles();
    this._wireColliders();
    this._buildHUD();
    this._wireInput();

    this.cameras.main.setBounds(0, 0, worldWidth, HEIGHT);
    this.cameras.main.startFollow(this.player.sprite, true, 0.08, 0.15);
    this.cameras.main.fadeIn(250, 0, 0, 0);

    // BGM kicks on first user gesture; ensureAudio was called from Title
    startBGM();

    this.events.once('shutdown', () => this._cleanup());
  }

  _buildBackground() {
    const { theme, level, worldWidth } = this;

    this.sky = this.add.graphics();
    const drawSky = () => {
      this.sky.clear();
      this.sky.fillGradientStyle(theme.skyTop, theme.skyTop, theme.skyBot, theme.skyBot, 1);
      this.sky.fillRect(0, 0, this.scale.width, this.scale.height);
    };
    drawSky();
    this.sky.setScrollFactor(0).setDepth(-100);

    if (theme.showMountains) {
      for (let x = -100; x < worldWidth; x += 220) {
        const m = this.add.image(x, HEIGHT - 60, theme.mountain).setOrigin(0, 1);
        m.setScrollFactor(0.2).setDepth(-90).setAlpha(level.theme === 'bagel' ? 0.85 : 0.6);
      }
    }

    // clouds: cover full parallax range; relative-wrap on repeat
    const cloudCoverage = worldWidth * 0.1 + Math.max(WIDTH, this.scale.width) + 200;
    this.clouds = [];
    for (let i = 0; i < 20; i++) {
      const cx = Phaser.Math.Between(-100, cloudCoverage);
      const cy = Phaser.Math.Between(30, 160);
      const c = this.add.image(cx, cy, 'cloud').setScrollFactor(0.1).setDepth(-80).setAlpha(0.85);
      this.clouds.push(c);
      this.tweens.add({
        targets: c, x: cloudCoverage + 100,
        duration: Phaser.Math.Between(40000, 70000),
        repeat: -1,
        onRepeat: () => { c.x = -100; }
      });
    }

    if (theme.showHills) {
      const hills = this.add.graphics();
      hills.fillStyle(theme.hillColor, 0.7);
      for (let x = 0; x < worldWidth; x += 180) hills.fillCircle(x, HEIGHT - 50, 110);
      hills.setScrollFactor(0.4).setDepth(-70);
    }

    if (theme.showBgTrees) {
      for (let x = 30; x < worldWidth; x += 110) {
        const t = this.add.image(x + Phaser.Math.Between(-20, 20), HEIGHT - 32, theme.tree)
          .setOrigin(0.5, 1).setScale(0.6).setTint(theme.bgTreeTint).setAlpha(0.7);
        t.setScrollFactor(0.55).setDepth(-60);
      }
    }

    this.wall = null;
    const drawWall = () => {
      if (!this.wall) return;
      const vw = this.scale.width;
      this.wall.clear();
      this.wall.fillStyle(0xd9b896, 1).fillRect(0, HEIGHT - 180, vw, 180);
      this.wall.fillStyle(0xc89866, 1).fillRect(0, HEIGHT - 180, vw, 3);
      this.wall.fillStyle(0xa87648, 0.25);
      for (let vx = 0; vx < vw; vx += 40) this.wall.fillRect(vx, HEIGHT - 175, 1, 175);
    };
    if (level.theme === 'bagel') {
      this.wall = this.add.graphics();
      drawWall();
      this.wall.setScrollFactor(0).setDepth(-90);
      for (let x = -40; x < worldWidth; x += 480) {
        this.add.image(x, 80, 'bagel_shelf').setOrigin(0, 0).setScrollFactor(0.3).setDepth(-75).setAlpha(0.55);
      }
    }

    this._drawSky = drawSky;
    this._drawWall = drawWall;
  }

  _buildGeometry() {
    const { theme, level, worldWidth } = this;

    this.holes = computeHoles(level);
    const inHole = (x) => this.holes.some(h => x >= h.left && x < h.right);
    const overHole = (x, halfW) => this.holes.some(h => (x + halfW) > h.left && (x - halfW) < h.right);
    this.inHole = inHole;
    this.overHole = overHole;

    // VISUAL ground tiles (no physics)
    for (let x = 0; x < worldWidth; x += TILE) {
      if (inHole(x)) continue;
      this.add.image(x + TILE / 2, HEIGHT - TILE / 2, theme.ground).setDepth(-20);
    }

    // PHYSICS: merged static bodies per contiguous run (one body per run, not per tile)
    this.platforms = this.physics.add.staticGroup();
    const runs = computeGroundRuns(worldWidth, this.holes);
    runs.forEach(r => {
      const rect = this.add.rectangle(r.x + r.w / 2, HEIGHT - TILE / 2, r.w, TILE);
      rect.setVisible(false);
      this.physics.add.existing(rect, true);
      this.platforms.add(rect);
    });

    // floating platforms
    const platKey = (k) => k === 'bigplatform' ? theme.bigplat : theme.plat;
    level.floats.forEach(([x, y, key]) => this.platforms.create(x, y, platKey(key)).refreshBody());

    // spike bed in every hole
    this.spikes = this.physics.add.staticGroup();
    this.holes.forEach(h => {
      const startX = h.left + SPIKE.HALF + SPIKE.BUFFER;
      const endX   = h.right - SPIKE.HALF - SPIKE.BUFFER;
      if (startX > endX) return;
      for (let x = startX; x <= endX; x += 16) {
        const s = this.spikes.create(x, HEIGHT - 8, theme.spike);
        s.body.setSize(SPIKE.BODY_W, SPIKE.BODY_H).setOffset(SPIKE.BODY_OFF_X, SPIKE.BODY_OFF_Y);
        s.refreshBody();
      }
    });

    // decorations (no physics)
    level.trees.forEach(x => {
      if (overHole(x, 32)) return;
      this.add.image(x, HEIGHT - 32, theme.tree).setOrigin(0.5, 1).setDepth(-10);
    });
    level.bushes.forEach(x => {
      if (overHole(x, 24)) return;
      this.add.image(x, HEIGHT - 32, theme.bush).setOrigin(0.5, 1).setDepth(-5);
    });
    level.rocks.forEach(x => {
      if (overHole(x, 14)) return;
      this.add.image(x, HEIGHT - 32, theme.rock).setOrigin(0.5, 1).setDepth(-5);
    });
  }

  _buildPickupsAndEnemies() {
    const { theme, level } = this;

    this.coins = this.physics.add.group({ allowGravity: false, immovable: true });
    level.coins.forEach(([x, y]) => {
      if (y > HEIGHT - 60 && this.inHole(x)) return;
      const c = this.coins.create(x, y, 'coin');
      this._addBob(c, y, 6, 600);
    });

    const customerLines = ["WHERE'S MY BAGEL?!", "EXTRA SCHMEAR!", "TOO SLOW!", "MANAGER!", "DECAF, NOT REGULAR!", "I WANT A REFUND!", "IT'S COLD!"];
    this.enemies = this.physics.add.group();
    level.enemies.forEach(d => {
      let minX = d.min, maxX = d.max;
      if (d.y > HEIGHT - 100) {
        this.holes.forEach(h => {
          if (minX >= h.left && minX < h.right) minX = h.right;
          if (maxX > h.left && maxX <= h.right) maxX = h.left;
        });
        if (minX > maxX) return;
      }
      const e = this.enemies.create(d.x, d.y, theme.enemy);
      e.body.setSize(ENEMY.BODY_W, ENEMY.BODY_H).setOffset(ENEMY.BODY_OFF_X, ENEMY.BODY_OFF_Y);
      e.setVelocityX(ENEMY.PATROL_SPEED);
      e.setBounce(0, 0);
      e.setCollideWorldBounds(true);
      e.minX = minX;
      e.maxX = maxX;
      this.tweens.add({ targets: e, scaleY: 0.85, duration: 350, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

      if (level.theme === 'bagel') {
        const shout = () => {
          if (!e.active) return;
          const line = Phaser.Math.RND.pick(customerLines);
          const t = this.add.text(e.x, e.y - 22, line, {
            fontSize: '9px', color: '#fff', fontFamily: 'monospace',
            backgroundColor: '#c23030', padding: { x: 3, y: 1 }
          }).setOrigin(0.5).setDepth(20);
          this.tweens.add({ targets: t, y: t.y - 14, alpha: 0, duration: 1500, onComplete: () => t.destroy() });
        };
        this.time.addEvent({
          delay: Phaser.Math.Between(2500, 5500),
          startAt: Phaser.Math.Between(0, 2000),
          loop: true,
          callback: shout
        });
      }
    });

    this.healthPickups = this.physics.add.group({ allowGravity: false, immovable: true });
    level.hearts.forEach(([x, y]) => {
      const h = this.healthPickups.create(x, y, 'bagel').setScale(0.55);
      h.body.setSize(56, 56).setOffset(4, 4);
      h.baseScale = 0.55;
      this._addBob(h, y, 6, 700);
      this._addScalePulse(h, 0.55, 0.65, 500);
    });
  }

  _buildGoalAndCheckpoints() {
    const { level } = this;
    const checkpoint = this.registry.get('checkpoint');

    this.checkpointFlags = this.physics.add.staticGroup();
    (level.checkpoints || []).forEach(([x, y]) => {
      const f = this.checkpointFlags.create(x, y, 'checkpoint').setOrigin(0.5, 1);
      f.body.setSize(14, 44).setOffset(1, 4);
      f.refreshBody();
      f.activated = false;
      if (checkpoint && checkpoint.x === f.x && checkpoint.y === f.y) {
        f.activated = true;
      } else {
        f.setTint(0x666666);
      }
    });

    this.goal = this.physics.add.staticSprite(level.goal[0], level.goal[1], 'goal').setOrigin(0.5, 1);
    if (level.theme === 'bagel') this.goal.setTint(0xffd24a);
    this.goal.refreshBody();
  }

  _spawnPlayer() {
    const checkpoint = this.registry.get('checkpoint');
    let sx, sy;
    if (checkpoint) {
      sx = checkpoint.x;
      sy = checkpoint.y - PLAYER.RESPAWN_OFFSET_Y;
    } else {
      [sx, sy] = this.level.playerStart;
    }
    this.player = new Player(this, sx, sy);
  }

  _buildParticles() {
    this.dust = this.add.particles(0, 0, 'dust', {
      speed: { min: 20, max: 70 },
      angle: { min: 200, max: 340 },
      scale: { start: 0.9, end: 0 },
      alpha: { start: 0.8, end: 0 },
      lifespan: 450,
      gravityY: 200,
      emitting: false
    });
    this.dust.setDepth(5);

    this.sparkles = this.add.particles(0, 0, 'spark', {
      speed: { min: 60, max: 160 },
      angle: { min: 0, max: 360 },
      scale: { start: 1.2, end: 0 },
      alpha: { start: 1, end: 0 },
      lifespan: { min: 300, max: 600 },
      gravityY: 120,
      rotate: { start: 0, end: 360 },
      blendMode: 'ADD',
      emitting: false
    });
    this.sparkles.setDepth(10);
  }

  _wireColliders() {
    const p = this.player.sprite;
    this.physics.add.collider(p, this.platforms);
    this.physics.add.collider(this.enemies, this.platforms);
    this.physics.add.overlap(p, this.coins, (_p, c) => this.collectCoin(c), null, this);
    this.physics.add.overlap(p, this.spikes, () => this.die(), null, this);
    this.physics.add.overlap(p, this.goal, () => this.reachGoal(), null, this);
    this.physics.add.overlap(p, this.enemies, (_p, e) => this.hitEnemy(e), null, this);
    this.physics.add.overlap(p, this.healthPickups, (_p, h) => this.collectHealth(h), null, this);
    this.physics.add.overlap(p, this.checkpointFlags, (_p, f) => this.hitCheckpoint(f), null, this);
  }

  _buildHUD() {
    this.scoreText = this.add.text(16, 16, 'Score: ' + this.registry.get('score'), {
      fontSize: '20px', color: '#fff', fontFamily: 'monospace',
      stroke: '#000', strokeThickness: 3
    }).setScrollFactor(0).setDepth(100);

    const currentLevel = this.registry.get('currentLevel');
    const label = 'Level ' + (currentLevel + 1) + '/' + LEVELS.length + (this.level.name ? ' — ' + this.level.name : '');
    this.levelText = this.add.text(this.scale.width - 16, 16, label, {
      fontSize: '18px', color: '#fff', fontFamily: 'monospace',
      stroke: '#000', strokeThickness: 3
    }).setOrigin(1, 0).setScrollFactor(0).setDepth(100);

    this.heartIcons = [];
    for (let i = 0; i < HEART_COUNT; i++) {
      const h = this.add.image(20 + i * 36, 56, 'heart_full').setOrigin(0, 0).setScale(2).setScrollFactor(0).setDepth(100);
      this.heartIcons.push(h);
    }
    this.updateHearts();

    const onViewportResize = () => {
      this._drawSky();
      this._drawWall();
      this.levelText.setPosition(this.scale.width - 16, 16);
    };
    this.game.events.on('viewport-resize', onViewportResize);
    this._onViewportResize = onViewportResize;
  }

  _wireInput() {
    this.controls = new Input(this);
    this.input.keyboard.on('keydown-F', toggleFs);
    this.input.keyboard.on('keydown-M', toggleMute);
  }

  _cleanup() {
    this.game.events.off('viewport-resize', this._onViewportResize);
    this.input.keyboard.off('keydown-F', toggleFs);
    this.input.keyboard.off('keydown-M', toggleMute);
    this.input.keyboard.removeAllKeys(true);
  }

  _addBob(obj, baseY, amp, period) {
    obj.baseY = baseY;
    obj.bobAmp = amp;
    obj.bobPeriod = period;
    obj.bobPhase = Math.random() * Math.PI * 2;
    this.bobbers.push(obj);
  }

  _addScalePulse(obj, low, high, period) {
    this.tweens.add({ targets: obj, scale: high, duration: period, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
  }

  updateHearts() {
    const hp = this.registry.get('hp');
    for (let i = 0; i < HEART_COUNT; i++) {
      const left = hp - i * 2;
      const key = left >= 2 ? 'heart_full' : left === 1 ? 'heart_half' : 'heart_empty';
      this.heartIcons[i].setTexture(key);
    }
  }

  update(time) {
    if (this.gameOver) {
      if (this.controls.restartJustPressed()) this._restartFromScratch();
      return;
    }

    if (this.controls.pauseJustPressed()) {
      this.scene.launch('Pause');
      this.scene.pause();
      return;
    }

    this.player.update(this.controls, time);

    // enemy patrol
    this.enemies.children.iterate(e => {
      if (!e || !e.active) return;
      if (e.x <= e.minX && e.body.velocity.x <= 0) { e.setVelocityX(ENEMY.PATROL_SPEED);  e.setFlipX(false); }
      if (e.x >= e.maxX && e.body.velocity.x >= 0) { e.setVelocityX(-ENEMY.PATROL_SPEED); e.setFlipX(true);  }
    });

    // shared bob loop (coins + hearts)
    for (let i = 0; i < this.bobbers.length; i++) {
      const b = this.bobbers[i];
      if (!b.active) continue;
      b.y = b.baseY - Math.sin((time / b.bobPeriod) * Math.PI * 2 + b.bobPhase) * b.bobAmp;
    }

    if (this.player.y > HEIGHT + 50) this.die();
  }

  _restartFromScratch() {
    this.registry.set('score', 0);
    this.registry.set('currentLevel', 0);
    this.registry.set('checkpoint', null);
    this.registry.set('hp', MAX_HP);
    this.gameOver = false;
    this.scene.restart();
  }

  collectCoin(coin) {
    this.sparkles.emitParticleAt(coin.x, coin.y, 12);
    sfx.coin();
    coin.destroy();
    const score = this.registry.get('score') + 10;
    this.registry.set('score', score);
    this.scoreText.setText('Score: ' + score);
  }

  collectHealth(heart) {
    if (this.registry.get('hp') >= MAX_HP) return;
    this.sparkles.emitParticleAt(heart.x, heart.y, 16);
    this.registry.set('hp', MAX_HP);
    this.updateHearts();
    sfx.coin();
    const txt = this.add.text(heart.x, heart.y - 10, '+FULL', {
      fontSize: '14px', color: '#7bff7b', fontFamily: 'monospace',
      stroke: '#000', strokeThickness: 3
    }).setOrigin(0.5);
    this.tweens.add({ targets: txt, y: txt.y - 30, alpha: 0, duration: 700, onComplete: () => txt.destroy() });
    heart.destroy();
  }

  hitCheckpoint(flag) {
    if (flag.activated) return;
    flag.activated = true;
    flag.clearTint();
    this.registry.set('checkpoint', { x: flag.x, y: flag.y });
    this.sparkles.emitParticleAt(flag.x, flag.y - 36, 16);
    sfx.checkpoint();
    const txt = this.add.text(flag.x, flag.y - 60, 'CHECKPOINT', {
      fontSize: '14px', color: '#7bf0ff', fontFamily: 'monospace',
      stroke: '#000', strokeThickness: 3
    }).setOrigin(0.5);
    this.tweens.add({ targets: txt, y: txt.y - 30, alpha: 0, duration: 900, onComplete: () => txt.destroy() });
  }

  hitEnemy(enemy) {
    if (this.gameOver || !enemy.active) return;
    const sp = this.player.sprite;
    if (sp.body.velocity.y > PLAYER.STOMP_VY_MIN && (sp.y + 23) < enemy.y + 4) {
      this.killEnemy(enemy);
      sp.setVelocityY(PLAYER.STOMP_BOUNCE);
      return;
    }
    if (this.time.now < this.invulnUntil) return;
    this.damagePlayer(1, enemy.x);
  }

  damagePlayer(amount, sourceX) {
    if (this.gameOver) return;
    const hp = Math.max(0, this.registry.get('hp') - amount);
    this.registry.set('hp', hp);
    this.updateHearts();
    this.invulnUntil = this.time.now + PLAYER.INVULN_MS;
    const sp = this.player.sprite;
    const src = (typeof sourceX === 'number') ? sourceX : (sp.flipX ? sp.x + 1 : sp.x - 1);
    const dir = sp.x < src ? -1 : 1;
    sp.setVelocity(dir * PLAYER.KNOCKBACK_VX, PLAYER.KNOCKBACK_VY);
    sfx.hit();
    this.player.flash();
    if (hp <= 0) this.die();
  }

  killEnemy(enemy) {
    this.sparkles.emitParticleAt(enemy.x, enemy.y, 8);
    this.dust.emitParticleAt(enemy.x, enemy.y + 8, 6);
    enemy.disableBody(true, true);
    sfx.stomp();
    const score = this.registry.get('score') + 20;
    this.registry.set('score', score);
    this.scoreText.setText('Score: ' + score);
  }

  die() {
    if (this.gameOver) return;
    this.gameOver = true;
    sfx.hit();
    const sp = this.player.sprite;
    sp.setTint(0xff0000);
    sp.body.checkCollision.none = true;
    sp.setVelocity(0, -300);
    this.cameras.main.flash(250, 200, 0, 0);
    this.cameras.main.fadeOut(500, 0, 0, 0);
    this.cameras.main.once('camerafadeoutcomplete', () => {
      this.registry.set('hp', MAX_HP);
      this.invulnUntil = 0;
      this.gameOver = false;
      this.scene.restart();
    });
  }

  reachGoal() {
    if (this.gameOver) return;
    this.gameOver = true;
    sfx.win();
    const currentLevel = this.registry.get('currentLevel');
    const nextLevel = currentLevel + 1;
    Save.setMaxLevel(nextLevel);

    if (nextLevel >= LEVELS.length) {
      this.add.text(this.scale.width / 2, HEIGHT / 2, 'YOU WIN!\nScore: ' + this.registry.get('score') + '\nPress R to restart', {
        fontSize: '32px', color: '#fff700', fontFamily: 'monospace',
        align: 'center', stroke: '#000', strokeThickness: 4
      }).setOrigin(0.5).setScrollFactor(0).setDepth(200);
      return;
    }

    this.add.text(this.scale.width / 2, HEIGHT / 2, 'Level ' + (currentLevel + 1) + ' clear!', {
      fontSize: '28px', color: '#fff700', fontFamily: 'monospace',
      align: 'center', stroke: '#000', strokeThickness: 4
    }).setOrigin(0.5).setScrollFactor(0).setDepth(200);

    this.cameras.main.fadeOut(700, 0, 0, 0);
    this.cameras.main.once('camerafadeoutcomplete', () => {
      this.registry.set('currentLevel', nextLevel);
      this.registry.set('checkpoint', null);
      this.registry.set('hp', MAX_HP);
      this.invulnUntil = 0;
      this.gameOver = false;
      this.scene.restart();
    });
  }
}

class PauseScene extends Phaser.Scene {
  constructor() { super('Pause'); }
  create() {
    const w = this.scale.width;
    const h = this.scale.height;
    this.add.rectangle(0, 0, w, h, 0x000000, 0.55).setOrigin(0, 0);
    this.add.text(w / 2, h / 2 - 20, 'PAUSED', {
      fontSize: '40px', color: '#fff', fontFamily: 'monospace',
      stroke: '#000', strokeThickness: 4
    }).setOrigin(0.5);
    this.add.text(w / 2, h / 2 + 30, 'Press P or Esc to resume', {
      fontSize: '14px', color: '#aaa', fontFamily: 'monospace'
    }).setOrigin(0.5);

    const resume = () => {
      this.scene.resume('Game');
      this.scene.stop();
    };
    this.input.keyboard.once('keydown-P', resume);
    this.input.keyboard.once('keydown-ESC', resume);
    this.input.once('pointerdown', resume);
  }
}

// ============================================================
// PHASER CONFIG + DOM glue
// ============================================================
const config = {
  type: Phaser.AUTO,
  width: WIDTH,
  height: HEIGHT,
  parent: 'game',
  backgroundColor: '#87ceeb',
  pixelArt: true,
  roundPixels: true,
  antialias: false,
  render: { pixelArt: true, antialias: false, roundPixels: true },
  physics: { default: 'arcade', arcade: { gravity: { y: 900 }, debug: false } },
  scale: { mode: Phaser.Scale.NONE, width: WIDTH, height: HEIGHT },
  scene: [BootScene, TitleScene, GameScene, PauseScene]
};
const game = new Phaser.Game(config);

// === Fullscreen with iOS fallback ===
const ua = navigator.userAgent;
const isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
const gameEl = document.getElementById('game');

function inNativeFs() { return !!(document.fullscreenElement || document.webkitFullscreenElement); }
function inPseudoFs() { return gameEl.classList.contains('pseudo-fs'); }
function inAnyFs() { return inNativeFs() || inPseudoFs(); }

function enterPseudoFs() {
  document.body.classList.add('pseudo-fs');
  gameEl.classList.add('pseudo-fs');
  tryLockLandscape();
  setTimeout(resizeGame, 30);
}
function exitPseudoFs() {
  document.body.classList.remove('pseudo-fs');
  gameEl.classList.remove('pseudo-fs');
  if (screen.orientation && screen.orientation.unlock) {
    try { screen.orientation.unlock(); } catch (_) {}
  }
  setTimeout(resizeGame, 30);
}
function tryLockLandscape() {
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(() => { /* unsupported, ignore */ });
  }
}

function toggleFs() {
  // Already in some fullscreen mode → exit
  if (inNativeFs()) {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    return;
  }
  if (inPseudoFs()) { exitPseudoFs(); return; }

  // Try native first (desktop, modern Android)
  const req = gameEl.requestFullscreen || gameEl.webkitRequestFullscreen;
  if (req && !isIOS) {
    const p = req.call(gameEl, { navigationUI: 'hide' });
    if (p && p.then) {
      p.then(tryLockLandscape).catch(() => enterPseudoFs());
    } else {
      tryLockLandscape();
    }
  } else {
    enterPseudoFs();
  }
}

document.getElementById('fs').addEventListener('click', (e) => {
  toggleFs();
  e.currentTarget.blur();
});
document.getElementById('mobile-fs').addEventListener('click', (e) => {
  toggleFs();
  e.currentTarget.blur();
});
document.getElementById('reset-save').addEventListener('click', (e) => {
  if (confirm('Clear all save data and restart from Level 1?')) {
    Save.clear();
    location.reload();
  }
  e.currentTarget.blur();
});

// Disable iOS double-tap zoom on game/control surfaces
['game','touch','mobile-fs'].forEach(id => {
  const n = document.getElementById(id);
  if (n) n.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
});

// touch controls bind to shared touchState
document.querySelectorAll('.t-btn').forEach(btn => {
  const key = btn.dataset.key;
  const on = (e) => { e.preventDefault(); touchState[key] = true; };
  const off = (e) => { e.preventDefault(); touchState[key] = false; };
  btn.addEventListener('pointerdown', on);
  btn.addEventListener('pointerup', off);
  btn.addEventListener('pointercancel', off);
  btn.addEventListener('pointerleave', off);
});

function updateRotateOverlay() {
  const isTouch = window.matchMedia('(pointer: coarse)').matches;
  const portrait = window.innerHeight > window.innerWidth;
  // Show overlay only on touch devices, in portrait, when game is the focus (pseudo-fs OR no controls visible matter)
  const shouldShow = isTouch && portrait && (inAnyFs() || isStandalone || window.innerWidth < 720);
  document.body.classList.toggle('show-rotate', shouldShow);
}

function resizeGame() {
  const canvas = game.canvas;
  if (!canvas) return;
  const fs = inAnyFs();
  if (fs) {
    const vw = window.innerWidth, vh = window.innerHeight;
    const scale = vh / HEIGHT;
    const gameW = Math.max(WIDTH, Math.round(vw / scale));
    game.scale.resize(gameW, HEIGHT);
    canvas.style.width = vw + 'px';
    canvas.style.height = vh + 'px';
    game.events.emit('viewport-resize', gameW, HEIGHT);
  } else {
    game.scale.resize(WIDTH, HEIGHT);
    canvas.style.width = WIDTH + 'px';
    canvas.style.height = HEIGHT + 'px';
    game.events.emit('viewport-resize', WIDTH, HEIGHT);
  }
  updateRotateOverlay();
}
document.addEventListener('fullscreenchange', () => setTimeout(resizeGame, 50));
document.addEventListener('webkitfullscreenchange', () => setTimeout(resizeGame, 50));
window.addEventListener('resize', resizeGame);
window.addEventListener('orientationchange', () => setTimeout(resizeGame, 100));
if (screen.orientation && screen.orientation.addEventListener) {
  screen.orientation.addEventListener('change', () => setTimeout(resizeGame, 100));
}
// initial rotate check after first paint
setTimeout(updateRotateOverlay, 100);
</script>
</body>
