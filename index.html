// procedural SFX via WebAudio — no assets
let actx = null;
function ensureAudio() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
}
function beep({ freq = 440, freqEnd = null, dur = 0.1, type = 'square', vol = 0.15, attack = 0.005, release = 0.05 }) {
  if (!actx) return;
  const t0 = actx.currentTime;
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (freqEnd !== null) osc.frequency.exponentialRampToValueAtTime(Math.max(1, freqEnd), t0 + dur);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(vol, t0 + attack);
  gain.gain.linearRampToValueAtTime(0, t0 + dur + release);
  osc.connect(gain).connect(actx.destination);
  osc.start(t0);
  osc.stop(t0 + dur + release + 0.02);
}
function noise({ dur = 0.1, vol = 0.15, filterFreq = 2000 }) {
  if (!actx) return;
  const t0 = actx.currentTime;
  const bufSize = Math.floor(actx.sampleRate * dur);
  const buf = actx.createBuffer(1, bufSize, actx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
  const src = actx.createBufferSource();
  src.buffer = buf;
  const filt = actx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = filterFreq;
  const gain = actx.createGain();
  gain.gain.value = vol;
  src.connect(filt).connect(gain).connect(actx.destination);
  src.start(t0);
}
const sfx = {
  jump:  () => beep({ freq: 300, freqEnd: 480, dur: 0.08, type: 'sine', vol: 0.07, attack: 0.005, release: 0.03 }),
  land:  () => noise({ dur: 0.08, vol: 0.18, filterFreq: 900 }),
  coin:  () => { beep({ freq: 880, dur: 0.06, type: 'triangle', vol: 0.15 });
                 setTimeout(() => beep({ freq: 1320, dur: 0.09, type: 'triangle', vol: 0.15 }), 60); },
  hit:   () => { beep({ freq: 220, freqEnd: 55, dur: 0.35, type: 'sawtooth', vol: 0.2 });
                 noise({ dur: 0.25, vol: 0.15, filterFreq: 600 }); },
  win:   () => { [523, 659, 784, 1047].forEach((f, i) =>

  stomp: () => { beep({ freq: 180, freqEnd: 80, dur: 0.12, type: 'square', vol: 0.15 });

  slash: () => noise({ dur: 0.12, vol: 0.14, filterFreq: 3200 }),
  checkpoint: () => { beep({ freq: 660, dur: 0.08, type: 'triangle', vol: 0.16 });

};

// --- BGM: procedural arp loop, scheduled via WebAudio ---
const bgm = { playing: false, muted: false, timer: null, nextTime: 0, stepIdx: 0 };
function startBGM() {
  if (!actx || bgm.playing) return;
  bgm.playing = true;
  bgm.stepIdx = 0;
  bgm.nextTime = actx.currentTime + 0.1;
  const bpm = 104;
  const step = 60 / bpm / 2; // eighth note
  const A2 = 110;
  // chord progression (semitones from A2): Am - F - C - G
  const prog = [
    [0, 3, 7, 12],
    [-4, 0, 5, 8],
    [3, 7, 10, 15],
    [-2, 5, 10, 14]
  ];
  const arpPattern = [0, 1, 2, 3, 2, 3, 1, 2];
  const freq = (semi) => A2 * Math.pow(2, semi / 12);
  const note = (t, f, dur, type, vol) => {
    if (bgm.muted) return;
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type = type;
    o.frequency.value = f;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
    o.connect(g).connect(actx.destination);
    o.start(t);
    o.stop(t + dur + 0.02);
  };
  const schedule = () => {
    while (bgm.nextTime < actx.currentTime + 0.25) {
      const barIdx = Math.floor(bgm.stepIdx / 8) % prog.length;
      const chord = prog[barIdx];
      const localStep = bgm.stepIdx % 8;
      // arp lead (one octave up)
      note(bgm.nextTime, freq(chord[arpPattern[localStep]]) * 2, step * 0.85, 'triangle', 0.035);
      // bass on beats 1 and 3
      if (localStep === 0 || localStep === 4) {
        note(bgm.nextTime, freq(chord[0]) / 2, step * 1.7, 'sine', 0.06);
      }
      // pad chord stab on bar start
      if (localStep === 0) {
        note(bgm.nextTime, freq(chord[1]), step * 3.5, 'sine', 0.018);
        note(bgm.nextTime, freq(chord[2]), step * 3.5, 'sine', 0.018);
      }
      bgm.nextTime += step;
      bgm.stepIdx++;
    }
  };
  bgm.timer = setInterval(schedule, 60);
  schedule();
}
function stopBGM() {
  if (bgm.timer) clearInterval(bgm.timer);
  bgm.timer = null;
  bgm.playing = false;
}
function toggleMute() { bgm.muted = !bgm.muted; }

function toggleFs() {
  const el = document.getElementById('game');
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  } else {
    (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
  }
}
document.getElementById('fs').addEventListener('click', (e) => {
  toggleFs();
  e.currentTarget.blur(); // prevent button re-triggering on Space/Enter
});

// Recompute Phaser size whenever viewport changes
function resizeGame() {
  const fs = document.fullscreenElement || document.webkitFullscreenElement;
  const w = fs ? window.innerWidth : WIDTH;
  const h = fs ? window.innerHeight : HEIGHT;
  // FIT scale: fit canvas inside w×h while keeping WIDTH:HEIGHT aspect
  const scale = Math.min(w / WIDTH, h / HEIGHT);
  const cw = Math.floor(WIDTH * scale);
  const ch = Math.floor(HEIGHT * scale);
  const canvas = game.canvas;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
}
document.addEventListener('fullscreenchange', () => setTimeout(resizeGame, 50));
document.addEventListener('webkitfullscreenchange', () => setTimeout(resizeGame, 50));
window.addEventListener('resize', resizeGame);

function titleCreate() {
  this.cameras.main.setBackgroundColor('#000000');

  // spin anim once
  if (!this.anims.exists('spin')) {
    this.anims.create({
      key: 'spin',
      frames: this.anims.generateFrameNumbers('player_spin', { start: 0, end: 7 }),
      frameRate: 10,
      repeat: -1
    });
  }

  const hero = this.add.sprite(WIDTH / 2, HEIGHT / 2 - 20, 'player_spin');
  hero.setScale(2);
  hero.play('spin');

  this.add.text(WIDTH / 2, HEIGHT - 80, 'World of Sosso', {
    fontSize: '40px', color: '#ffffff', fontFamily: 'monospace',
    stroke: '#444', strokeThickness: 2
  }).setOrigin(0.5);

  const prompt = this.add.text(WIDTH / 2, HEIGHT - 36, 'Press any key to start', {
    fontSize: '16px', color: '#aaaaaa', fontFamily: 'monospace'
  }).setOrigin(0.5);
  this.tweens.add({ targets: prompt, alpha: 0.3, duration: 700, yoyo: true, repeat: -1 });

  this.input.keyboard.once('keydown', () => {
    ensureAudio();
    this.scene.start('Game');
  });
  this.input.once('pointerdown', () => {
    ensureAudio();
    this.scene.start('Game');
  });
}

function create() {
  gameOver = false;
  invulnUntil = 0;
  const level = LEVELS[currentLevel];
  const theme = THEMES[level.theme || 'outdoor'];
  const worldWidth = level.worldWidth;
  this.physics.world.setBounds(0, 0, worldWidth, HEIGHT);
  this.cameras.main.resetFX();

  // --- LAYERED PARALLAX BACKGROUND ---
  // sky gradient (locked to camera)
  const sky = this.add.graphics();
  sky.fillGradientStyle(theme.skyTop, theme.skyTop, theme.skyBot, theme.skyBot, 1);
  sky.fillRect(0, 0, WIDTH, HEIGHT);
  sky.setScrollFactor(0).setDepth(-100);

  // distant backdrop (mountains / shop buildings)
  if (theme.showMountains) {
    for (let x = -100; x < worldWidth; x += 220) {
      const m = this.add.image(x, HEIGHT - 60, theme.mountain).setOrigin(0, 1);
      m.setScrollFactor(0.2).setDepth(-90).setAlpha(level.theme === 'bagel' ? 0.85 : 0.6);
    }
  }

  // drifting clouds
  for (let i = 0; i < 12; i++) {
    const cx = Phaser.Math.Between(0, WIDTH);
    const cy = Phaser.Math.Between(30, 160);
    const c = this.add.image(cx, cy, 'cloud').setScrollFactor(0.1).setDepth(-80).setAlpha(0.85);
    this.tweens.add({ targets: c, x: cx + 200, duration: Phaser.Math.Between(40000, 70000), repeat: -1, yoyo: false,
      onRepeat: () => { c.x = -100; }
    });
  }

  // mid-layer hills
  if (theme.showHills) {
    const hills = this.add.graphics();
    hills.fillStyle(theme.hillColor, 0.7);
    for (let x = 0; x < worldWidth; x += 180) {
      hills.fillCircle(x, HEIGHT - 50, 110);
    }
    hills.setScrollFactor(0.4).setDepth(-70);
  }

  // background tree line
  if (theme.showBgTrees) {
    for (let x = 30; x < worldWidth; x += 110) {
      const t = this.add.image(x + Phaser.Math.Between(-20, 20), HEIGHT - 32, theme.tree)
        .setOrigin(0.5, 1).setScale(0.6).setTint(theme.bgTreeTint).setAlpha(0.7);
      t.setScrollFactor(0.55).setDepth(-60);
    }
  }

  // --- LEVEL GEOMETRY ---
  platforms = this.physics.add.staticGroup();

  // ground with per-level gaps
  for (let x = 0; x < worldWidth; x += 32) {
    const inGap = level.groundGaps.some(([a, b]) => x >= a && x < b);
    if (!inGap) {
      platforms.create(x + 16, HEIGHT - 16, theme.ground).refreshBody();
    }
  }

  // floating platforms — remap generic keys via theme
  const platKey = (k) => k === 'bigplatform' ? theme.bigplat : theme.plat;
  level.floats.forEach(([x, y, key]) => platforms.create(x, y, platKey(key)).refreshBody());

  // spikes
  spikes = this.physics.add.staticGroup();
  level.spikes.forEach(x => {
    const s = spikes.create(x, HEIGHT - 8, theme.spike);
    s.body.setSize(20, 12).setOffset(2, 4);
  });

  // coins
  coins = this.physics.add.group({ allowGravity: false, immovable: true });
  level.coins.forEach(([x, y]) => {
    const c = coins.create(x, y, 'coin');
    this.tweens.add({ targets: c, y: y - 6, duration: 600, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
  });

  // --- FOREGROUND DECORATIONS (no physics) ---
  level.trees.forEach(x => {
    this.add.image(x, HEIGHT - 32, theme.tree).setOrigin(0.5, 1).setDepth(-10);
  });
  level.bushes.forEach(x => {
    this.add.image(x, HEIGHT - 32, theme.bush).setOrigin(0.5, 1).setDepth(-5);
  });
  level.rocks.forEach(x => {
    this.add.image(x, HEIGHT - 32, theme.rock).setOrigin(0.5, 1).setDepth(-5);
  });

  // --- ENEMIES (patrolling) ---
  const customerLines = ["WHERE'S MY BAGEL?!", "EXTRA SCHMEAR!", "TOO SLOW!", "MANAGER!", "DECAF, NOT REGULAR!", "I WANT A REFUND!", "IT'S COLD!"];
  enemies = this.physics.add.group();
  level.enemies.forEach(d => {
    const e = enemies.create(d.x, d.y, theme.enemy);
    e.body.setSize(28, 20).setOffset(2, 4);
    e.setVelocityX(60);
    e.setBounce(0, 0);
    e.setCollideWorldBounds(true);
    e.minX = d.min;
    e.maxX = d.max;
    this.tweens.add({ targets: e, scaleY: 0.85, duration: 350, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

    // bagel-shop customers shout occasionally
    if (level.theme === 'bagel') {
      const shout = () => {
        if (!e.active) return;
        const line = Phaser.Math.RND.pick(customerLines);
        const t = this.add.text(e.x, e.y - 22, line, {
          fontSize: '9px', color: '#fff', fontFamily: 'monospace',
          backgroundColor: '#c23030', padding: { x: 3, y: 1 }
        }).setOrigin(0.5).setDepth(20);
        this.tweens.add({ targets: t, y: t.y - 14, alpha: 0, duration: 1500, onComplete: () => t.destroy() });
      };
      this.time.addEvent({
        delay: Phaser.Math.Between(2500, 5500),
        startAt: Phaser.Math.Between(0, 2000),
        loop: true,
        callback: shout
      });
    }
  });
  this.physics.add.collider(enemies, platforms);

  // --- HEALTH PICKUPS ---
  healthPickups = this.physics.add.group({ allowGravity: false, immovable: true });
  level.hearts.forEach(([x, y]) => {
    const h = healthPickups.create(x, y, 'bagel').setScale(0.55);
    h.body.setSize(56, 56).setOffset(4, 4);
    this.tweens.add({ targets: h, y: y - 6, duration: 700, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    this.tweens.add({ targets: h, scale: 0.65, duration: 500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
  });

  // --- CHECKPOINTS (bottom-anchored cyan flags, tinted gray until activated) ---
  checkpointFlags = this.physics.add.staticGroup();
  (level.checkpoints || []).forEach(([x, y]) => {
    const f = checkpointFlags.create(x, y, 'checkpoint').setOrigin(0.5, 1);
    f.body.setSize(14, 44).setOffset(1, 4);
    f.refreshBody();
    f.cpX = x;
    f.cpY = y;
    f.activated = false;
    if (checkpoint && checkpoint.x === x && checkpoint.y === y) {
      f.activated = true;
    } else {
      f.setTint(0x666666);
    }
  });

  // goal flag at end
  goal = this.physics.add.staticSprite(level.goal[0], level.goal[1], 'goal').setOrigin(0.5, 1);
  if (level.theme === 'bagel') goal.setTint(0xffd24a);
  goal.refreshBody();

  // --- PLAYER spawn at checkpoint or level start ---
  let spawnX, spawnY;
  if (checkpoint) {
    spawnX = checkpoint.x;
    spawnY = checkpoint.y - 60;
  } else {
    [spawnX, spawnY] = level.playerStart;
  }
  player = this.physics.add.sprite(spawnX, spawnY, 'player');
  player.setCollideWorldBounds(true);
  player.setMaxVelocity(220, 800);
  player.body.setSize(21, 45).setOffset(35, 24);

  this.anims.create({
    key: 'idle',
    frames: [{ key: 'player', frame: 0 }],
    frameRate: 1
  });
  this.anims.create({
    key: 'run',
    frames: this.anims.generateFrameNumbers('player', { start: 0, end: 5 }),
    frameRate: 12,
    repeat: -1
  });
  this.anims.create({
    key: 'jump',
    frames: this.anims.generateFrameNumbers('player_jump', { start: 0, end: 8 }),
    frameRate: 14,
    repeat: 0
  });
  this.anims.create({
    key: 'punch',
    frames: this.anims.generateFrameNumbers('player_punch', { start: 0, end: 2 }),
    frameRate: 18,
    repeat: 0
  });

  this.dust = this.add.particles(0, 0, 'dust', {
    speed: { min: 20, max: 70 },
    angle: { min: 200, max: 340 },
    scale: { start: 0.9, end: 0 },
    alpha: { start: 0.8, end: 0 },
    lifespan: 450,
    gravityY: 200,
    emitting: false
  });
  this.dust.setDepth(5);

  this.sparkles = this.add.particles(0, 0, 'spark', {
    speed: { min: 60, max: 160 },
    angle: { min: 0, max: 360 },
    scale: { start: 1.2, end: 0 },
    alpha: { start: 1, end: 0 },
    lifespan: { min: 300, max: 600 },
    gravityY: 120,
    rotate: { start: 0, end: 360 },
    blendMode: 'ADD',
    emitting: false
  });
  this.sparkles.setDepth(10);

  this.wasOnGround = true;
  this.lastRunDustAt = 0;
  this.isPunching = false;
  const onPunchEnd = () => { this.isPunching = false; };
  player.on('animationcomplete-punch', onPunchEnd);
  this.events.once('shutdown', () => player.off('animationcomplete-punch', onPunchEnd));

  this.physics.add.collider(player, platforms);
  this.physics.add.overlap(player, coins, collectCoin, null, this);
  this.physics.add.overlap(player, spikes, hitSpike, null, this);
  this.physics.add.overlap(player, goal, reachGoal, null, this);
  this.physics.add.overlap(player, enemies, hitEnemy, null, this);
  this.physics.add.overlap(player, healthPickups, collectHealth, null, this);
  this.physics.add.overlap(player, checkpointFlags, hitCheckpoint, null, this);

  // camera
  this.cameras.main.setBounds(0, 0, worldWidth, HEIGHT);
  this.cameras.main.startFollow(player, true, 0.1, 0.1);

  cursors = this.input.keyboard.createCursorKeys();
  this.wasd = this.input.keyboard.addKeys({
    up: Phaser.Input.Keyboard.KeyCodes.W,
    left: Phaser.Input.Keyboard.KeyCodes.A,
    down: Phaser.Input.Keyboard.KeyCodes.S,
    right: Phaser.Input.Keyboard.KeyCodes.D
  });
  this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
  this.rKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.R);
  this.attackKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.X);
  this.jKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.J);
  this.lastAttackAt = 0;
  this.input.keyboard.on('keydown-F', toggleFs);
  this.input.keyboard.on('keydown-M', toggleMute);

  // unlock WebAudio on first key (autoplay policy), then start BGM
  const unlock = () => { ensureAudio(); startBGM(); };
  unlock(); // actx already unlocked from Title scene; safe no-op otherwise
  this.input.keyboard.once('keydown', unlock);
  this.input.once('pointerdown', unlock);

  // strip per-scene listeners on shutdown so they don't accumulate across restarts
  this.events.once('shutdown', () => {
    this.input.keyboard.off('keydown-F', toggleFs);
    this.input.keyboard.off('keydown-M', toggleMute);
    this.input.keyboard.removeAllKeys(true);
  });

  scoreText = this.add.text(16, 16, 'Score: ' + score, {
    fontSize: '20px', color: '#fff', fontFamily: 'monospace',
    stroke: '#000', strokeThickness: 3
  }).setScrollFactor(0);

  const levelLabel = 'Level ' + (currentLevel + 1) + '/' + LEVELS.length + (level.name ? ' — ' + level.name : '');
  levelText = this.add.text(WIDTH - 16, 16, levelLabel, {
    fontSize: '18px', color: '#fff', fontFamily: 'monospace',
    stroke: '#000', strokeThickness: 3
  }).setOrigin(1, 0).setScrollFactor(0);

  // hearts HUD
  heartIcons = [];
  for (let i = 0; i < 5; i++) {
    const h = this.add.image(20 + i * 36, 56, 'heart_full').setOrigin(0, 0).setScale(2).setScrollFactor(0);
    heartIcons.push(h);
  }
  updateHearts();

  // brief fade-in on respawn / level start
  this.cameras.main.fadeIn(250, 0, 0, 0);
}

function updateHearts() {
  for (let i = 0; i < 5; i++) {
    const left = hp - i * 2;
    const key = left >= 2 ? 'heart_full' : left === 1 ? 'heart_half' : 'heart_empty';
    heartIcons[i].setTexture(key);
  }
}

function update() {
  if (gameOver) {
    if (Phaser.Input.Keyboard.JustDown(this.rKey)) { resetState(); this.scene.restart(); }
    return;
  }

  const onGround = player.body.blocked.down || player.body.touching.down;

  const leftDown  = cursors.left.isDown  || this.wasd.left.isDown;
  const rightDown = cursors.right.isDown || this.wasd.right.isDown;
  const upDown    = cursors.up.isDown    || this.wasd.up.isDown || this.spaceKey.isDown;

  if (leftDown) {
    player.setAccelerationX(-800);
    player.setFlipX(true);
  } else if (rightDown) {
    player.setAccelerationX(800);
    player.setFlipX(false);
  } else {
    player.setAccelerationX(0);
    player.setVelocityX(player.body.velocity.x * 0.8);
  }

  let justJumped = false;
  if (upDown && onGround) {
    player.setVelocityY(-470);
    sfx.jump();
    player.anims.play('jump', true);
    justJumped = true;
  }

  if (onGround && !justJumped && !this.isPunching) {
    if (Math.abs(player.body.velocity.x) > 10) {
      player.anims.play('run', true);
    } else {
      player.anims.play('idle', true);
    }
  }

  const feetX = player.x;
  const feetY = player.y + 23;

  if (!this.wasOnGround && onGround) {
    const vy = Math.min(800, Math.abs(player.body.velocity.y) + 200);
    const count = Phaser.Math.Clamp(Math.floor(vy / 120), 4, 10);
    this.dust.emitParticleAt(feetX, feetY, count);
    sfx.land();
  }

  const vx = player.body.velocity.x;
  if (onGround && Math.abs(vx) > 60 && this.time.now - this.lastRunDustAt > 90) {
    const behind = feetX + (vx > 0 ? -10 : 10);
    this.dust.emitParticleAt(behind, feetY, 1);
    this.lastRunDustAt = this.time.now;
  }

  this.wasOnGround = onGround;

  enemies.children.iterate(e => {
    if (!e || !e.active) return;
    if (e.x <= e.minX && e.body.velocity.x <= 0) { e.setVelocityX(60);  e.setFlipX(false); }
    if (e.x >= e.maxX && e.body.velocity.x >= 0) { e.setVelocityX(-60); e.setFlipX(true);  }
  });

  if ((Phaser.Input.Keyboard.JustDown(this.attackKey) || Phaser.Input.Keyboard.JustDown(this.jKey))
      && this.time.now - this.lastAttackAt > 350) {
    this.lastAttackAt = this.time.now;
    doAttack.call(this);
  }

  if (player.y > HEIGHT + 50) die.call(this);
}

function collectHealth(_p, heart) {
  if (hp >= MAX_HP) return;
  this.sparkles.emitParticleAt(heart.x, heart.y, 16);
  hp = MAX_HP;
  updateHearts();
  sfx.coin();
  const txt = this.add.text(heart.x, heart.y - 10, '+FULL', {
    fontSize: '14px', color: '#7bff7b', fontFamily: 'monospace',
    stroke: '#000', strokeThickness: 3
  }).setOrigin(0.5);
  this.tweens.add({ targets: txt, y: txt.y - 30, alpha: 0, duration: 700, onComplete: () => txt.destroy() });
  heart.destroy();
}

function collectCoin(_p, coin) {
  this.sparkles.emitParticleAt(coin.x, coin.y, 12);
  sfx.coin();
  coin.destroy();
  score += 10;
  scoreText.setText('Score: ' + score);
}

function hitCheckpoint(_p, flag) {
  if (flag.activated) return;
  flag.activated = true;
  flag.clearTint();
  checkpoint = { x: flag.cpX, y: flag.cpY };
  this.sparkles.emitParticleAt(flag.x, flag.y - 36, 16);
  sfx.checkpoint();
  const txt = this.add.text(flag.x, flag.y - 60, 'CHECKPOINT', {
    fontSize: '14px', color: '#7bf0ff', fontFamily: 'monospace',
    stroke: '#000', strokeThickness: 3
  }).setOrigin(0.5);
  this.tweens.add({ targets: txt, y: txt.y - 30, alpha: 0, duration: 900, onComplete: () => txt.destroy() });
}

function hitEnemy(_p, enemy) {
  if (gameOver || !enemy.active) return;
  if (player.body.velocity.y > 50 && (player.y + 23) < enemy.y + 4) {
    killEnemy.call(this, enemy);
    player.setVelocityY(-380);
    return;
  }
  if (this.time.now < invulnUntil) return;
  damagePlayer.call(this, 1, enemy.x);
}

function damagePlayer(amount, sourceX) {
  hp = Math.max(0, hp - amount);
  updateHearts();
  invulnUntil = this.time.now + 900;
  const src = (typeof sourceX === 'number') ? sourceX : (player.flipX ? player.x + 1 : player.x - 1);
  const dir = player.x < src ? -1 : 1;
  player.setVelocity(dir * 220, -260);
  sfx.hit();
  this.tweens.add({
    targets: player, alpha: 0.3, duration: 90, yoyo: true, repeat: 4,
    onComplete: () => player.setAlpha(1)
  });
  if (hp <= 0) die.call(this);
}

function killEnemy(enemy) {
  this.sparkles.emitParticleAt(enemy.x, enemy.y, 8);
  this.dust.emitParticleAt(enemy.x, enemy.y + 8, 6);
  enemy.disableBody(true, true);
  sfx.stomp();
  score += 20;
  scoreText.setText('Score: ' + score);
}

function doAttack() {
  const dir = player.flipX ? -1 : 1;
  this.isPunching = true;
  player.anims.play('punch', true);
  sfx.slash();
  this.time.delayedCall(80, () => {
    enemies.children.iterate(e => {
      if (!e || !e.active) return;
      const dx = e.x - player.x;
      const dy = e.y - player.y;
      if (Math.sign(dx) === dir && Math.abs(dx) < 50 && Math.abs(dy) < 35) {
        killEnemy.call(this, e);
      }
    });
  });
}

function hitSpike() { die.call(this); }

// death → respawn at checkpoint or level start; score preserved, HP refilled
function die() {
  if (gameOver) return;
  gameOver = true;
  sfx.hit();
  player.setTint(0xff0000);
  player.body.checkCollision.none = true;
  player.setVelocity(0, -300);
  this.cameras.main.flash(250, 200, 0, 0);
  this.cameras.main.fadeOut(500, 0, 0, 0);
  this.cameras.main.once('camerafadeoutcomplete', () => {
    hp = MAX_HP;
    invulnUntil = 0;
    gameOver = false;
    this.scene.restart();
  });
}

function reachGoal() {
  if (gameOver) return;
  gameOver = true;
  sfx.win();
  const nextLevel = currentLevel + 1;
  if (nextLevel >= LEVELS.length) {
    this.add.text(WIDTH / 2, HEIGHT / 2, 'YOU WIN!\nScore: ' + score + '\nPress R to restart', {
      fontSize: '32px', color: '#fff700', fontFamily: 'monospace',
      align: 'center', stroke: '#000', strokeThickness: 4
    }).setOrigin(0.5).setScrollFactor(0);
    return;
  }
  this.add.text(WIDTH / 2, HEIGHT / 2, 'Level ' + (currentLevel + 1) + ' clear!', {
    fontSize: '28px', color: '#fff700', fontFamily: 'monospace',
    align: 'center', stroke: '#000', strokeThickness: 4
  }).setOrigin(0.5).setScrollFactor(0);
  this.cameras.main.fadeOut(700, 0, 0, 0);
  this.cameras.main.once('camerafadeoutcomplete', () => {
    currentLevel = nextLevel;
    checkpoint = null;
    hp = MAX_HP;
    invulnUntil = 0;
    gameOver = false;
    this.scene.restart();
  });
}

function resetState() {
  score = 0;
  gameOver = false;
  hp = MAX_HP;
  invulnUntil = 0;
  currentLevel = 0;
  checkpoint = null;
}
</script>
